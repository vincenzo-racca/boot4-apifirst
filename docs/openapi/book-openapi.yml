openapi: 3.0.3

info:
  title: Book API
  description: API for book management
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local server

tags:
  - name: Books
    description: Operations on books

paths:
  /books:
    get:
      tags:
        - Books
      summary: Retrieve all books
      operationId: getAllBooks
      parameters:
        - name: page
          in: query
          description: Page number (starting from 0)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0

        - name: size
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20

        - name: sort
          in: query
          description: >
            Sorting criteria in the format `field,(asc|desc)`.
            Can be specified multiple times.
            Examples: `title,asc`, `author,desc`
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
          example:
            - title,asc
            - author,desc
      responses:
        '200':
          description: List of books retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookPage'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      tags:
        - Books
      summary: Create a new book
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
            examples:
              paperback:
                value:
                  bookType: PAPERBACK
                  isbn: "9780132350884"
                  title: Clean Code
                  author: Robert C. Martin
                  price: 45.00
                  publicationDate: "2008-08-01"
                  pages: 464
                  weightGrams: 730.0
              ebook:
                value:
                  bookType: EBOOK
                  isbn: "9781234567890"
                  title: Mastering Java 21
                  author: Luca Rossi
                  price: 45.50
                  publicationDate: "2024-11-15"
                  format: EPUB
                  fileSizeMb: 8.2
              audiobook:
                value:
                  bookType: AUDIOBOOK
                  isbn: "9782345678901"
                  title: Cloud Native Architecture
                  author: Marco Bianchi
                  price: 35.00
                  publicationDate: "2023-08-20"
                  narrator: Luca Ward
                  durationMinutes: 450
      responses:
        '201':
          description: Book created successfully
          headers:
            Location:
              description: URI of the created book
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /books/{isbn}:
    parameters:
      - name: isbn
        in: path
        required: true
        description: ISBN code of the book
        schema:
          type: string
          example: "9780132350884"

    get:
      tags:
        - Books
      summary: Retrieve a book by ISBN
      operationId: getBookByIsbn
      responses:
        '200':
          description: Book found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Conflict:
      description: Book already exists
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFound:
      description: Book not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  schemas:
    BookBase:
      type: object
      description: >
        Common book fields shared by request and response payloads.
        The model is flat: every subtype-specific field is optional and its relevance
        depends on `bookType`. The coherence between `bookType` and the subtype-specific
        fields (e.g. an AUDIOBOOK must not carry `pages`/`format`) is validated
        server-side; an incoherent payload is rejected with HTTP 400.
      required:
        - bookType
        - isbn
        - title
        - author
      properties:
        bookType:
          type: string
          description: Determines which subtype-specific fields are meaningful
          enum:
            - PAPERBACK
            - EBOOK
            - AUDIOBOOK
          example: EBOOK
        isbn:
          type: string
          example: "9780132350884"
        title:
          type: string
          example: Clean Code
        author:
          type: string
          example: Robert C. Martin
        price:
          type: number
          example: 45.00
        publicationDate:
          type: string
          format: date
          example: "2008-08-01"
        pages:
          type: integer
          description: Number of physical pages, only meaningful when bookType is PAPERBACK
          example: 464
        weightGrams:
          type: number
          description: Weight of the book in grams, only meaningful when bookType is PAPERBACK
          example: 730.0
        format:
          type: string
          description: Digital format, only meaningful when bookType is EBOOK
          example: EPUB
        fileSizeMb:
          type: number
          description: File size in MB, only meaningful when bookType is EBOOK
          example: 8.2
        narrator:
          type: string
          description: Narrator name, only meaningful when bookType is AUDIOBOOK
          example: Luca Ward
        durationMinutes:
          type: integer
          description: Duration in minutes, only meaningful when bookType is AUDIOBOOK
          example: 450

    CreateBookRequest:
      description: >
        Payload to create a book. Shares its shape with BookBase but is kept as a
        distinct type so request and response contracts can evolve independently.
      allOf:
        - $ref: '#/components/schemas/BookBase'

    BookResponse:
      description: >
        Book representation returned by read operations. Shares its shape with BookBase
        but is kept as a distinct type so request and response contracts can evolve
        independently.
      allOf:
        - $ref: '#/components/schemas/BookBase'

    BookPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BookResponse'

        pageable:
          $ref: '#/components/schemas/Pageable'

        totalElements:
          type: integer
          format: int64
          example: 100

        totalPages:
          type: integer
          example: 5

        size:
          type: integer
          example: 20

        number:
          type: integer
          example: 0

        numberOfElements:
          type: integer
          example: 20

        first:
          type: boolean
          example: true

        last:
          type: boolean
          example: false

        empty:
          type: boolean
          example: false

    Pageable:
      type: object
      properties:
        pageNumber:
          type: integer
          example: 0

        pageSize:
          type: integer
          example: 20

        offset:
          type: integer
          format: int64
          example: 0

        paged:
          type: boolean
          example: true

        unpaged:
          type: boolean
          example: false

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
          example: about:blank
        title:
          type: string
          example: Bad Request
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: Invalid request
        instance:
          type: string
          format: uri
          example: /api/books
