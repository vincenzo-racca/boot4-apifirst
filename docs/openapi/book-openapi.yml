openapi: 3.0.3

info:
  title: Book API
  description: API for book management
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Local server

tags:
  - name: Books
    description: Operations on books

paths:
  /books:
    get:
      tags:
        - Books
      summary: Retrieve all books
      operationId: getAllBooks
      parameters:
        - name: page
          in: query
          description: Page number (starting from 0)
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0

        - name: size
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20

        - name: sort
          in: query
          description: >
            Sorting criteria in the format `field,(asc|desc)`.
            Can be specified multiple times.
            Examples: `title,asc`, `author,desc`
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
          example:
            - title,asc
            - author,desc
      responses:
        '200':
          description: List of books retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookPage'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      tags:
        - Books
      summary: Create a new book
      operationId: createBook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
      responses:
        '201':
          description: Book created successfully
          headers:
            Location:
              description: URI of the created book
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /books/{isbn}:
    parameters:
      - name: isbn
        in: path
        required: true
        description: ISBN code of the book
        schema:
          type: string
          example: "9780132350884"

    get:
      tags:
        - Books
      summary: Retrieve a book by ISBN
      operationId: getBookByIsbn
      responses:
        '200':
          description: Book found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookResponse'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Conflict:
      description: Book already exists
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFound:
      description: Book not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  schemas:
    BookDto:
      type: object
      description: >
        Polymorphic base for all book types. The `bookType` property acts as the
        discriminator and selects the concrete schema (PaperbackDto, EBookDto,
        AudioBookDto). Subtype-specific fields live on the concrete schemas, so the
        contract itself guarantees that a given book only carries the fields that
        belong to its type.
      required:
        - bookType
        - isbn
        - title
        - author
      properties:
        bookType:
          type: string
          description: >
            Discriminator that selects the concrete book type.
            Allowed values: PAPERBACK, EBOOK, AUDIOBOOK. The set of valid values is
            enforced by the discriminator mapping below: an unknown value cannot be
            deserialized into any concrete type and is rejected with HTTP 400.
          example: EBOOK
        isbn:
          type: string
          example: "9780132350884"
        title:
          type: string
          example: Clean Code
        author:
          type: string
          example: Robert C. Martin
        price:
          type: number
          example: 45.00
        publicationDate:
          type: string
          format: date
          example: "2008-08-01"
      discriminator:
        propertyName: bookType
        mapping:
          PAPERBACK: '#/components/schemas/PaperbackDto'
          EBOOK: '#/components/schemas/EBookDto'
          AUDIOBOOK: '#/components/schemas/AudioBookDto'

    PaperbackDto:
      description: Physical book; carries paperback-specific fields
      allOf:
        - $ref: '#/components/schemas/BookDto'
        - type: object
          required:
            - pages
          properties:
            pages:
              type: integer
              description: Number of physical pages
              example: 464
            weightGrams:
              type: number
              description: Weight of the book in grams
              example: 730.0
      example:
        bookType: PAPERBACK
        isbn: "9780132350884"
        title: Clean Code
        author: Robert C. Martin
        price: 45.00
        publicationDate: "2008-08-01"
        pages: 464
        weightGrams: 730.0

    EBookDto:
      description: Digital book; carries e-book-specific fields
      allOf:
        - $ref: '#/components/schemas/BookDto'
        - type: object
          required:
            - format
            - fileSizeMb
          properties:
            format:
              type: string
              description: Digital format
              example: EPUB
            fileSizeMb:
              type: number
              description: File size in MB
              example: 8.2
      example:
        bookType: EBOOK
        isbn: "9781234567890"
        title: Mastering Java 21
        author: Luca Rossi
        price: 45.50
        publicationDate: "2024-11-15"
        format: EPUB
        fileSizeMb: 8.2

    AudioBookDto:
      description: Audio book; carries audiobook-specific fields
      allOf:
        - $ref: '#/components/schemas/BookDto'
        - type: object
          required:
            - narrator
            - durationMinutes
          properties:
            narrator:
              type: string
              description: Narrator name
              example: Luca Ward
            durationMinutes:
              type: integer
              description: Duration in minutes
              example: 450
      example:
        bookType: AUDIOBOOK
        isbn: "9782345678901"
        title: Cloud Native Architecture
        author: Marco Bianchi
        price: 35.00
        publicationDate: "2023-08-20"
        narrator: Luca Ward
        durationMinutes: 450

    CreateBookRequest:
      description: >
        Polymorphic payload to create a book. The concrete schema is selected by the
        `bookType` discriminator defined on BookDto, so each book type is validated
        against its own rules (e.g. an e-book requires `format` and `fileSizeMb`).
      oneOf:
        - $ref: '#/components/schemas/PaperbackDto'
        - $ref: '#/components/schemas/EBookDto'
        - $ref: '#/components/schemas/AudioBookDto'

    BookResponse:
      description: >
        Polymorphic book representation returned by read operations. The concrete schema
        is selected by the `bookType` discriminator defined on BookDto, letting clients
        deserialize each item into the right concrete type.
      oneOf:
        - $ref: '#/components/schemas/PaperbackDto'
        - $ref: '#/components/schemas/EBookDto'
        - $ref: '#/components/schemas/AudioBookDto'

    BookPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BookResponse'

        pageable:
          $ref: '#/components/schemas/Pageable'

        totalElements:
          type: integer
          format: int64
          example: 100

        totalPages:
          type: integer
          example: 5

        size:
          type: integer
          example: 20

        number:
          type: integer
          example: 0

        numberOfElements:
          type: integer
          example: 20

        first:
          type: boolean
          example: true

        last:
          type: boolean
          example: false

        empty:
          type: boolean
          example: false

    Pageable:
      type: object
      properties:
        pageNumber:
          type: integer
          example: 0

        pageSize:
          type: integer
          example: 20

        offset:
          type: integer
          format: int64
          example: 0

        paged:
          type: boolean
          example: true

        unpaged:
          type: boolean
          example: false

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
          example: about:blank
        title:
          type: string
          example: Bad Request
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: Invalid request
        instance:
          type: string
          format: uri
          example: /api/books
